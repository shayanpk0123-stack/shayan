<body><!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<div class="accordion" id="myAccordion">

  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#one">
        What is HTML?
      </button>
    </h2>

    <div id="one" class="accordion-collapse collapse show" data-bs-parent="#myAccordion">
      <div class="accordion-body">
        HTML ek markup language hai jo website banane ke liye use hoti hai.
      </div>
    </div>
  </div>

  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#two">
        What is CSS?
      </button>
    </h2>

    <div id="two" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
      <div class="accordion-body">
        CSS website ki designing aur styling ke liye use hoti hai.
      </div>
    </div>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>

</body>
</html>
